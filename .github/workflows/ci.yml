name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Run unit tests
      run: go test ./... -v -timeout 30s

    - name: Generate coverage
      run: go test ./... -coverprofile=coverage.out -covermode=atomic

    - name: Check coverage
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep "total:" | awk '{print $3}' | tr -d '%')
        echo "Coverage: ${COVERAGE}%"
        if [ $(echo "$COVERAGE < 65" | bc) -eq 1 ]; then
          echo "Error: Coverage ${COVERAGE}% is below minimum 65%"
          exit 1
        fi
        echo "Coverage OK: ${COVERAGE}% >= 65%"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        fail_ci_if_error: false

  complexity:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run CCN check
      run: bash scripts/ccn/check_ccn.sh

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install golangci-lint
      run: |
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2

    - name: Run golangci-lint
      run: golangci-lint run ./...

  mutation:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Run mutation testing
      run: bash scripts/check_mutation.sh
      timeout-minutes: 15

    - name: Check mutation score
      run: |
        # The script already checks the mutation score and exits with error if too low
        echo "Mutation testing completed successfully"

  build:
    runs-on: ubuntu-latest
    needs: [test, complexity, lint]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build
      run: go build -v ./...

    - name: Verify no architecture violations
      run: bash scripts/pre_commit_check.sh 2>&1 | grep -E "(✔|✗)" || true
