name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Run unit tests
      run: go test ./... -v -timeout 2m

    - name: Generate coverage
      run: go test ./... -coverprofile=coverage.out -covermode=atomic

    - name: Check coverage
      run: |
        COVERAGE=$(go tool cover -func=coverage.out | grep "total:" | awk '{print $3}' | tr -d '%')
        echo "Coverage: ${COVERAGE}%"
        if [ $(echo "$COVERAGE < 80" | bc) -eq 1 ]; then
          echo "Error: Coverage ${COVERAGE}% is below minimum 80%"
          exit 1
        fi
        echo "Coverage OK: ${COVERAGE}% >= 80%"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        fail_ci_if_error: false

  complexity:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Install gocyclo
      run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

    - name: Run CCN check
      run: bash scripts/ccn/check_ccn.sh

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2

  mutation:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Run mutation testing
      run: bash scripts/check_mutation.sh
      timeout-minutes: 15

    - name: Check mutation score
      run: |
        # The script already checks the mutation score and exits with error if too low
        echo "Mutation testing completed successfully"

  file-size:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check file sizes (max 500 lines)
      run: |
        FAILED=0
        for file in $(find . -name '*.go' -not -path './vendor/*'); do
          LINE_COUNT=$(wc -l < "$file")
          if [ "$LINE_COUNT" -gt 500 ]; then
            echo "✗ $file has $LINE_COUNT lines (max: 500)"
            FAILED=1
          fi
        done
        if [ "$FAILED" -eq 1 ]; then
          echo "Error: Some files exceed 500 line limit"
          exit 1
        fi
        echo "All Go files within 500 line limit"

  build:
    runs-on: ubuntu-latest
    needs: [test, complexity, lint, file-size]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Build
      run: go build -v ./...

    - name: Verify no architecture violations
      run: bash scripts/pre_commit_check.sh 2>&1 | grep -E "(✔|✗)" || true
