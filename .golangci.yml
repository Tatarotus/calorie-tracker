version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocyclo
    - errcheck

linters-settings:
  gocyclo:
    min-complexity: 20
  govet:
    enable-all: true

formatters:
  enable:
    - goimports

issues:
  exclude-dirs:
    - vendor
  exclude-rules:
    - path: "config/config_test.go"
      linters:
        - errcheck